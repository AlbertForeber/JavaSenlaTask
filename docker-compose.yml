services:
  db:
    image: postgres
    container_name: postgre_db
    restart: always
    environment:
      - POSTGRES_USER=senla
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=senladb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senla -d senladb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/postgres_data
    networks:
      - db_app

  app:
    build: .
    container_name: main_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    networks:
      - db_app
    ports:
      - "8080:8080"

networks:
  db_app:
    driver: bridge
volumes:
  postgres_data:
